apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: multi-service

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:

      imagePullSecrets:
      - name: ghcr-secret

      containers:
      - name: frontend

        image: ghcr.io/sridevi0616/frontend:v30

        ports:
        - containerPort: 5000
